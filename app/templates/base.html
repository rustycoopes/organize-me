<!DOCTYPE html>
<html lang="en" data-theme="{{ 'dark' if dark_mode else 'corporate' }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}OrganizeMe{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <!-- Alpine's x-cloak only works if the page supplies this rule itself; without it,
         x-cloak elements flash visibly for one frame before Alpine initializes. -->
    <style>[x-cloak] { display: none !important; }</style>
    {% block head %}{% endblock %}
  </head>
  <body class="min-h-screen bg-base-200">
    {% block content %}{% endblock %}
  </body>
</html>
