{% extends "base.html" %}
{% from "macros/ui.html" import card_page %}

{% block title %}Reset password — OrganizeMe{% endblock %}

{% block content %}
{% call card_page("Reset your password") %}

  <form method="post" action="/api/v1/auth/reset-password" class="flex flex-col gap-4 mt-2">
    <input type="hidden" name="token" id="token" value="{{ token }}" />

    <label class="form-control w-full">
      <div class="label"><span class="label-text">New password</span></div>
      <input
        type="password"
        name="password"
        id="password"
        required
        minlength="8"
        autocomplete="new-password"
        placeholder="At least 8 characters"
        class="input input-bordered w-full"
      />
    </label>

    <label class="form-control w-full">
      <div class="label"><span class="label-text">Confirm new password</span></div>
      <input
        type="password"
        name="confirm_password"
        id="confirm_password"
        required
        minlength="8"
        autocomplete="new-password"
        placeholder="Re-enter your new password"
        class="input input-bordered w-full"
      />
    </label>

    <button type="submit" class="btn btn-primary mt-2">Reset password</button>
  </form>

  <p class="text-sm mt-4">
    <a href="/login" class="link link-primary">Back to log in</a>
  </p>

{% endcall %}
{% endblock %}
