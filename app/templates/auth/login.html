{% extends "chrome_base.html" %}
{% from "macros/ui.html" import card_page %}

{% block title %}Log in — OrganizeMe{% endblock %}

{% block content %}
<div
  x-data="{
    error: '',
    info: '',
    submitting: false,
    init() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('error') === 'google_auth_failed') {
        this.error = 'Google sign-in failed or was cancelled. Please try again.';
      } else if (params.get('registered') === '1') {
        this.info = 'Account created — please log in.';
      }
    },
    async login(event) {
      this.submitting = true;
      this.error = '';
      const formData = new FormData(event.target);
      const email = formData.get('email');
      if (typeof email === 'string') {
        formData.set('email', email.trim());
      }
      try {
        const response = await fetch('/api/v1/auth/login', {
          method: 'POST',
          body: formData,
        });
        if (!response.ok) {
          this.error = 'Incorrect email or password.';
          return;
        }
        window.location.href = '/profile';
      } catch (e) {
        this.error = 'Could not log in. Please try again.';
      } finally {
        this.submitting = false;
      }
    },
  }"
>
{% call card_page("Log in") %}

  <div role="alert" aria-live="polite" class="alert alert-info mt-2" x-show="info" x-cloak>
    <span x-text="info"></span>
  </div>

  <div role="alert" aria-live="polite" class="alert alert-error mt-2" x-show="error" x-cloak>
    <span x-text="error"></span>
  </div>

  <form
    method="post"
    action="/api/v1/auth/login"
    class="flex flex-col gap-4 mt-2"
    @submit.prevent="login"
  >
    <label class="form-control w-full">
      <div class="label"><span class="label-text">Email</span></div>
      <input
        type="email"
        name="email"
        id="email"
        required
        autocomplete="email"
        placeholder="you@example.com"
        class="input input-bordered w-full"
      />
    </label>

    <label class="form-control w-full">
      <div class="label">
        <span class="label-text">Password</span>
        <a href="/forgot-password" class="label-text-alt link link-primary">Forgot password?</a>
      </div>
      <input
        type="password"
        name="password"
        id="password"
        required
        autocomplete="current-password"
        placeholder="********"
        class="input input-bordered w-full"
      />
    </label>

    <button type="submit" class="btn btn-primary mt-2" :disabled="submitting">
      <span x-show="!submitting">Log in</span>
      <span x-show="submitting" x-cloak>Logging in...</span>
    </button>
  </form>

  <div class="divider">OR</div>

  <a href="/api/v1/auth/google?next=/login" class="btn btn-outline w-full gap-2">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" class="h-5 w-5" aria-hidden="true">
      <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12s5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
      <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
      <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
      <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
    </svg>
    Sign in with Google
  </a>

  <p class="text-sm mt-4">
    Don't have an account?
    <a href="/register" class="link link-primary">Register</a>
  </p>

{% endcall %}
</div>
{% endblock %}
