name: Deploy

on:
  push:
    branches:
      - main

env:
  GCP_PROJECT_ID: gen-lang-client-0791944342
  GCP_REGION: northamerica-northeast1
  ARTIFACT_REGISTRY_REPO: organizeme
  IMAGE_NAME: app

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_PROD_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET_PROD }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      GOOGLE_OAUTH_REDIRECT_URI: https://organizeme.russcoopersoftware.com/api/v1/auth/google/callback
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run Alembic migrations (Supabase prod)
        run: uv run alembic upgrade head

      - name: Run pytest
        run: uv run pytest

      - name: Run mypy
        run: uv run mypy app tests

  deploy-prod:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # JWT_SECRET is intentionally absent here (Slice R4): wired below via --set-secrets from
      # GCP Secret Manager (`jwt-secret-prod`), not this plaintext env-vars-file, so the
      # hosted-app side (event-creator) can read the same Secret Manager value without a network
      # call to the Host. R13 (#168) removed ENCRYPTION_KEY/GEMINI_API_KEY/TWILIO_*/
      # DROPBOX_OAUTH_*/GOOGLE_DRIVE_REDIRECT_URI from here too - the Host code that read them
      # was deleted in that slice; event-creator's own CI/CD wires its own copies.
      - name: Write Cloud Run env vars file
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_PROD_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REDIRECT_URI: https://organizeme.russcoopersoftware.com/api/v1/auth/google/callback
        run: |
          cat > /tmp/cloud-run-env.yaml <<EOF
          DATABASE_URL: "${DATABASE_URL}"
          RESEND_API_KEY: "${RESEND_API_KEY}"
          GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID}"
          GOOGLE_OAUTH_CLIENT_SECRET: "${GOOGLE_OAUTH_CLIENT_SECRET}"
          GOOGLE_OAUTH_REDIRECT_URI: "${GOOGLE_OAUTH_REDIRECT_URI}"
          REGISTRY_INVOKER_SERVICE_ACCOUNT: "170051512639-compute@developer.gserviceaccount.com"
          EOF

      - name: Build image
        run: |
          docker build \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push image
        run: |
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run Prod
        # Platform default: request-based billing. Never add --no-cpu-throttling or
        # --min-instances here — see docs/adr/0001-event-creator-worker-cpu-throttling.md.
        run: |
          gcloud run deploy organizeme-prod \
            --image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --env-vars-file=/tmp/cloud-run-env.yaml \
            --set-secrets=JWT_SECRET=jwt-secret-prod:latest \
            --quiet

      # Registry-decoupling (organize-me#218): mirrors event-creator's own "wire this service's
      # own URL" follow-up step - REGISTRY_ENDPOINT_URL is the OIDC audience every consumer's
      # token must be minted for, only known after this deploy.
      - name: Wire this service's own URL for the registry endpoint's OIDC audience
        run: |
          SERVICE_URL=$(gcloud run services describe organizeme-prod \
            --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} \
            --format='value(status.url)')
          gcloud run services update organizeme-prod \
            --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} \
            --update-env-vars=REGISTRY_ENDPOINT_URL="${SERVICE_URL}" \
            --quiet
