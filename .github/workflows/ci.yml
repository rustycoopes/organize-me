name: CI

on:
  pull_request:
    branches:
      - main

env:
  GCP_PROJECT_ID: gen-lang-client-0791944342
  GCP_REGION: northamerica-northeast1
  ARTIFACT_REGISTRY_REPO: organizeme
  IMAGE_NAME: app

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_QA_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET_QA }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      GOOGLE_OAUTH_REDIRECT_URI: https://organizeme.qa.russcoopersoftware.com/api/v1/auth/google/callback
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev --group build

      - name: Build Tailwind CSS
        run: uv run python scripts/build_css.py

      - name: Verify compiled CSS is non-empty and contains the canary utility class
        # Fails loudly (not silently) if the tokens.css import or the content-scan glob breaks -
        # `bg-flame` only exists in the compiled output if the "Signal" @theme tokens were
        # actually picked up, so an accidental drop of the tokens import, a broken @source glob,
        # or an empty/near-empty build all fail this check instead of shipping unstyled.
        run: |
          size=$(stat -c%s app/static/css/app.css)
          echo "Compiled app.css is ${size} bytes"
          if [ "$size" -lt 1000 ]; then
            echo "::error::app.css is suspiciously small (${size} bytes) — Tailwind build likely produced empty/near-empty output"
            exit 1
          fi
          if ! grep -q '\.bg-flame' app/static/css/app.css; then
            echo "::error::canary class .bg-flame is missing from app.css — design tokens likely failed to compile in"
            exit 1
          fi

      - name: Run Alembic migrations (Supabase QA)
        run: uv run alembic upgrade head

      - name: Run pytest
        run: uv run pytest

      - name: Run mypy
        run: uv run mypy app tests scripts

  deploy-qa:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # NOTE: E2E_TEST_MODE=true is written here for QA ONLY. It enables the test-only
      # /api/v1/internal/e2e/* helper endpoints (issue #23). It must never appear in prod's
      # deploy (deploy.yml) - those routes return 404 wherever the flag is unset.
      # JWT_SECRET is intentionally absent here (Slice R4): wired below via --set-secrets from
      # GCP Secret Manager (`jwt-secret-qa`), not this plaintext env-vars-file, so the hosted-app
      # side (event-creator) can read the same Secret Manager value without a network call to the
      # Host. R13 (#168) removed ENCRYPTION_KEY/GEMINI_API_KEY/TWILIO_*/DROPBOX_OAUTH_*/
      # GOOGLE_DRIVE_REDIRECT_URI from here too - the Host code that read them (storage-provider
      # credential encryption, the LLM pipeline, SMS/Dropbox notifications, the Drive-connect
      # OAuth flow) was deleted in that slice; event-creator's own CI/CD wires its own copies.
      - name: Write Cloud Run env vars file
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_QA_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REDIRECT_URI: https://organizeme.qa.russcoopersoftware.com/api/v1/auth/google/callback
        run: |
          cat > /tmp/cloud-run-env.yaml <<EOF
          DATABASE_URL: "${DATABASE_URL}"
          RESEND_API_KEY: "${RESEND_API_KEY}"
          GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID}"
          GOOGLE_OAUTH_CLIENT_SECRET: "${GOOGLE_OAUTH_CLIENT_SECRET}"
          GOOGLE_OAUTH_REDIRECT_URI: "${GOOGLE_OAUTH_REDIRECT_URI}"
          E2E_TEST_MODE: "true"
          REGISTRY_INVOKER_SERVICE_ACCOUNT: "170051512639-compute@developer.gserviceaccount.com"
          EOF

      - name: Build image
        run: |
          docker build \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push image
        run: |
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run QA
        # Platform default: request-based billing. Never add --no-cpu-throttling or
        # --min-instances here — see docs/adr/0001-event-creator-worker-cpu-throttling.md.
        run: |
          gcloud run deploy organizeme-qa \
            --image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --env-vars-file=/tmp/cloud-run-env.yaml \
            --set-secrets=JWT_SECRET=jwt-secret-qa:latest \
            --quiet

      # Registry-decoupling (organize-me#218): mirrors event-creator's own "wire this service's
      # own URL" follow-up step - REGISTRY_ENDPOINT_URL is the OIDC audience every consumer's
      # token must be minted for, only known after this deploy.
      - name: Wire this service's own URL for the registry endpoint's OIDC audience
        run: |
          SERVICE_URL=$(gcloud run services describe organizeme-qa \
            --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} \
            --format='value(status.url)')
          gcloud run services update organizeme-qa \
            --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} \
            --update-env-vars=REGISTRY_ENDPOINT_URL="${SERVICE_URL}" \
            --quiet

  e2e-qa:
    needs: deploy-qa
    runs-on: ubuntu-latest
    env:
      # The shared Load Balancer's QA custom domain, not the Host's Cloud Run URL directly - see
      # e2e/playwright.config.ts's docstring for why (R7's cross-service htmx fragments need the
      # LB's URL-map routing, which the bare Cloud Run URL bypasses entirely).
      PLAYWRIGHT_BASE_URL: https://organizeme.qa.russcoopersoftware.com
    defaults:
      run:
        working-directory: e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests against QA
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
