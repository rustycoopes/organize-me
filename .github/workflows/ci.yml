name: CI

on:
  pull_request:
    branches:
      - main

env:
  GCP_PROJECT_ID: gen-lang-client-0791944342
  GCP_REGION: northamerica-northeast1
  ARTIFACT_REGISTRY_REPO: organizeme
  IMAGE_NAME: app

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_QA_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET_QA }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      GOOGLE_OAUTH_REDIRECT_URI: https://organizeme-qa-170051512639.northamerica-northeast1.run.app/api/v1/auth/google/callback
      # Storage-credential encryption key (issue #45). Set on the repo since #78; the tests inject
      # their own keys regardless, so they pass either way.
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run Alembic migrations (Supabase QA)
        run: uv run alembic upgrade head

      - name: Run pytest
        run: uv run pytest

      - name: Run mypy
        run: uv run mypy app tests

  deploy-qa:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # NOTE: E2E_TEST_MODE=true is written here for QA ONLY. It enables the test-only
      # /api/v1/internal/e2e/* helper endpoints (issue #23). It must never appear in prod's
      # deploy (deploy.yml) - those routes return 404 wherever the flag is unset.
      - name: Write Cloud Run env vars file
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_QA_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET_QA }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REDIRECT_URI: https://organizeme-qa-170051512639.northamerica-northeast1.run.app/api/v1/auth/google/callback
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          cat > /tmp/cloud-run-env.yaml <<EOF
          DATABASE_URL: "${DATABASE_URL}"
          JWT_SECRET: "${JWT_SECRET}"
          RESEND_API_KEY: "${RESEND_API_KEY}"
          GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID}"
          GOOGLE_OAUTH_CLIENT_SECRET: "${GOOGLE_OAUTH_CLIENT_SECRET}"
          GOOGLE_OAUTH_REDIRECT_URI: "${GOOGLE_OAUTH_REDIRECT_URI}"
          E2E_TEST_MODE: "true"
          ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
          EOF

      - name: Build image
        run: |
          docker build \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push image
        run: |
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run QA
        run: |
          gcloud run deploy organizeme-qa \
            --image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --env-vars-file=/tmp/cloud-run-env.yaml \
            --quiet

  e2e-qa:
    needs: deploy-qa
    runs-on: ubuntu-latest
    env:
      # The QA Cloud Run URL the freshly-deployed revision now serves. Kept in sync with the
      # GOOGLE_OAUTH_REDIRECT_URI host above and e2e/playwright.config.ts's fallback.
      PLAYWRIGHT_BASE_URL: https://organizeme-qa-170051512639.northamerica-northeast1.run.app
    defaults:
      run:
        working-directory: e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests against QA
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
